<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .scale{display:flex;align-items:flex-end;gap:14px}
  .u{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:#1C1917;border-radius:2px}
  .num{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
</style></head><body>
<div class="card">
  <div class="lbl">Spacing · 4-based</div>
  <div class="scale">
    <div class="u"><div class="box" style="width:4px;height:4px"></div><div class="num">4</div></div>
    <div class="u"><div class="box" style="width:8px;height:8px"></div><div class="num">8</div></div>
    <div class="u"><div class="box" style="width:12px;height:12px"></div><div class="num">12</div></div>
    <div class="u"><div class="box" style="width:16px;height:16px"></div><div class="num">16</div></div>
    <div class="u"><div class="box" style="width:20px;height:20px"></div><div class="num">20</div></div>
    <div class="u"><div class="box" style="width:24px;height:24px"></div><div class="num">24</div></div>
    <div class="u"><div class="box" style="width:32px;height:32px"></div><div class="num">32</div></div>
    <div class="u"><div class="box" style="width:40px;height:40px"></div><div class="num">40</div></div>
  </div>
</div></body></html>
