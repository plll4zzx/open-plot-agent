<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .ic{width:44px;height:44px;border-radius:8px;background:#FFFFFF;border:1px solid #E7E0D1;display:flex;align-items:center;justify-content:center;color:#44403C;flex-direction:column;gap:2px}
  .ic svg{stroke-width:2}
  .ic .n{font-family:var(--font-mono);font-size:8.5px;color:#A8A29E}
  .em{width:44px;height:44px;border-radius:8px;background:#FFFFFF;border:1px solid #E7E0D1;display:flex;align-items:center;justify-content:center;font-size:18px;flex-direction:column;gap:1px}
  .em .n{font-family:var(--font-mono);font-size:8.5px;color:#A8A29E}
</style></head><body>
<div class="card">
  <div class="lbl">Iconography · lucide + semantic emoji</div>
  <div class="row">
    <div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C1917"><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></svg></div>
    <div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#44403C"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
    <div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#44403C"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#44403C"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#44403C"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6M4.22 4.22l4.24 4.24m7.08 7.08 4.24 4.24M1 12h6m10 0h6M4.22 19.78l4.24-4.24m7.08-7.08 4.24-4.24"/></svg></div>
    <div class="em">🔧<span class="n">tool</span></div>
    <div class="em">✨<span class="n">agent</span></div>
    <div class="em">📡<span class="n">ingest</span></div>
    <div class="em">🧠<span class="n">memory</span></div>
    <div class="em">🔒<span class="n">final</span></div>
  </div>
</div></body></html>
