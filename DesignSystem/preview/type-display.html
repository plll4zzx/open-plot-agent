<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .row{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
  .row:last-child{margin-bottom:0}
  .tag{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint);width:70px;flex-shrink:0}
  .hero{font-family:'Fraunces',serif;font-weight:400;font-size:42px;letter-spacing:-0.02em;color:var(--fg);line-height:1}
  .hero em{font-style:italic;font-weight:500}
</style></head><body>
<div class="card">
  <div class="row"><span class="tag">42 / 400</span><span class="hero">学术图表 <em>工作室</em></span></div>
  <div class="row"><span class="tag">Fraunces</span><span style="font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:15px;color:var(--fg)">预览 · Fig.2 时间演化</span></div>
</div></body></html>
