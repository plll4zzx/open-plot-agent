<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#FFFFFF;border:1px solid #E7E0D1;width:64px;height:48px}
  .num{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
</style></head><body>
<div class="card">
  <div class="lbl">Radius scale</div>
  <div class="row">
    <div class="u"><div class="box" style="border-radius:4px"></div><div class="num">4 · xs</div></div>
    <div class="u"><div class="box" style="border-radius:6px"></div><div class="num">6 · sm</div></div>
    <div class="u"><div class="box" style="border-radius:8px"></div><div class="num">8 · md · btn</div></div>
    <div class="u"><div class="box" style="border-radius:12px"></div><div class="num">12 · lg · card</div></div>
    <div class="u"><div class="box" style="border-radius:16px"></div><div class="num">16 · xl</div></div>
  </div>
</div></body></html>
