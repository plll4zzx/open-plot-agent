<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:12px}
  .p{background:#FFFFFF;border:1px solid #E7E0D1;border-radius:12px;padding:18px;font-family:var(--font-body)}
  h3{font-family:'Fraunces',serif;font-weight:500;font-size:16px;margin:0 0 2px 0;color:var(--fg)}
  .meta{font-family:var(--font-mono);font-size:10.5px;color:#A8A29E;margin-bottom:10px}
  .strip{display:flex;gap:6px;margin-bottom:12px}
  .strip div{flex:1;height:36px;border-radius:4px}
  .info{display:flex;justify-content:space-between;font-size:11px;color:#57534E}
  .info .tag{font-family:var(--font-mono);color:#A8A29E}
</style></head><body>
<div class="card">
  <div class="lbl">Project card</div>
  <div class="p">
    <div class="strip">
      <div style="background:linear-gradient(135deg,#457B9D 0%,#E63946 100%)"></div>
      <div style="background:linear-gradient(135deg,#0F766E,#1C1917)"></div>
      <div style="background:linear-gradient(135deg,#B45309,#FFF 120%);border:1px solid #E7E0D1"></div>
      <div style="background:linear-gradient(135deg,#7C3AED,#457B9D)"></div>
    </div>
    <h3>Nature Submission 2026 ⭐</h3>
    <div class="meta">Figure 1-4 · 细胞动力学</div>
    <div class="info"><span>■■■■  7 charts</span><span class="tag">昨天 · 2h 前</span></div>
  </div>
</div></body></html>
