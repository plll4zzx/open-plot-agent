<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:12px}
  .row{display:flex;align-items:baseline;gap:14px}
  .tag{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint);width:110px;flex-shrink:0}
  .mono-code{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg);background:rgba(0,0,0,0.03);padding:4px 8px;border-radius:4px}
  .mono-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .mono-data{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--fg-body)}
  .latex{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--fg)}
</style></head><body>
<div class="card">
  <div class="row"><span class="tag">Mono · code 11.5</span><span class="mono-code">ax.set_yscale('log')</span></div>
  <div class="row"><span class="tag">Mono · tag 10</span><span class="mono-tag">WORKSPACE · 7 PROJECTS</span></div>
  <div class="row"><span class="tag">Mono · data 11.5</span><span class="mono-data">24 × 8  ·  n=2000  ·  +3/s</span></div>
  <div class="row"><span class="tag">LaTeX · 19 italic</span><span class="latex">∂X₁/∂t = α(X_c − X₁)</span></div>
</div></body></html>
