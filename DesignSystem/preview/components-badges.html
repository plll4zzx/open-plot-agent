<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:10px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;padding:3px 7px;border-radius:4px;text-transform:uppercase}
  .b-final{background:rgba(180,83,9,0.10);color:#B45309}
  .b-ai{background:rgba(124,58,237,0.10);color:#7C3AED}
  .b-data{background:rgba(15,118,110,0.10);color:#0F766E}
  .b-style{background:rgba(28,25,23,0.06);color:#44403C}
  .git{font-family:var(--font-mono);font-size:10.5px;display:inline-flex;align-items:center;gap:4px}
  .dot{font-size:8px}
</style></head><body>
<div class="card">
  <div class="lbl">Badges · commit type tags</div>
  <div class="row">
    <span class="badge b-final">[FINAL]</span>
    <span class="badge b-ai">[AI]</span>
    <span class="badge b-data">[DATA]</span>
    <span class="badge b-style">[STYLE]</span>
    <span class="badge b-style">[EDIT]</span>
  </div>
  <div class="lbl" style="margin-top:6px">Git status</div>
  <div class="row">
    <span class="git" style="color:#0F766E"><span class="dot">●</span>已保存</span>
    <span class="git" style="color:#B45309"><span class="dot">●</span>保存中…</span>
    <span class="git" style="color:#A8A29E"><span class="dot">●</span>等待提交</span>
  </div>
</div></body></html>
