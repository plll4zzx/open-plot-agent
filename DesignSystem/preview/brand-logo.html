<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;align-items:center;justify-content:center}
  .logo{display:flex;align-items:center;gap:10px}
  .mark{width:36px;height:36px;border-radius:6px;background:#1C1917;display:flex;align-items:center;justify-content:center}
  .mark svg{stroke:#F5F1EA}
  .word{font-family:'Fraunces',serif;font-weight:500;font-style:italic;font-size:22px;color:var(--fg)}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:#A8A29E;margin-left:14px;text-transform:uppercase}
</style></head><body>
<div class="card">
  <div class="logo">
    <div class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></svg></div>
    <span class="word">OpenPlotAgent</span>
    <span class="tag">v0 · design system</span>
  </div>
</div></body></html>
