<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:20px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .acc{display:flex;gap:12px;align-items:center}
  .dot{width:56px;height:56px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#F5F1EA;font-family:var(--font-body);font-size:20px}
  .meta{display:flex;flex-direction:column}
  .meta b{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:14px;color:var(--fg)}
  .meta .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);margin-top:2px}
  .meta .use{font-size:10.5px;color:var(--fg-dim);margin-top:3px;line-height:1.3}
</style></head><body>
<div class="card">
  <div class="lbl">Semantic accents · one job each</div>
  <div class="grid">
    <div class="acc"><div class="dot" style="background:#B45309">🔒</div><div class="meta"><b>Amber</b><span class="hex">#B45309</span><span class="use">Finalize only · 1 per screen</span></div></div>
    <div class="acc"><div class="dot" style="background:#0F766E">✓</div><div class="meta"><b>Teal</b><span class="hex">#0F766E</span><span class="use">Success · saved</span></div></div>
    <div class="acc"><div class="dot" style="background:#7C3AED">✨</div><div class="meta"><b>Violet</b><span class="hex">#7C3AED</span><span class="use">Agent · LLM · tools</span></div></div>
  </div>
</div></body></html>
