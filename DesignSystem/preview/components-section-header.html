<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:22px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:12px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .sh{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border:1px solid #E7E0D1;border-radius:8px;background:rgba(255,255,255,0.5)}
  .l{display:flex;align-items:center;gap:8px}
  .num{font-family:var(--font-mono);font-size:10px;color:#A8A29E}
  .t{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:14px;color:var(--fg)}
  .sub{font-size:11px;color:#A8A29E}
  .r{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:10.5px;color:#0F766E}
</style></head><body>
<div class="card">
  <div class="lbl">Section header · the house pattern</div>
  <div class="sh"><div class="l"><span class="num">01</span><span class="t">预览</span><span class="sub">· Fig.2 时间演化</span></div><div class="r">● 已保存</div></div>
  <div class="sh"><div class="l"><span class="num">02</span><span class="t">对话</span><span class="sub">· 12 turns</span></div><div class="r" style="color:#A8A29E">⌘1</div></div>
  <div class="sh"><div class="l"><span class="num">03</span><span class="t">数据</span><span class="sub">· 粘贴·清洗</span></div><div class="r" style="color:#78716C">↗ 全屏</div></div>
</div></body></html>
