<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg)}
  .card{padding:26px;min-height:calc(100vh - 40px);box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:22px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-faint)}
  .row{display:flex;gap:20px;align-items:center}
  .b{width:150px;height:70px;border-radius:12px;background:#FFFFFF;border:1px solid #E7E0D1;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted)}
  .shadow-chart{box-shadow:0 1px 2px rgba(28,25,23,0.04),0 12px 32px -12px rgba(28,25,23,0.12)}
  .shadow-card{box-shadow:0 1px 2px rgba(28,25,23,0.03)}
  .shadow-pop{box-shadow:0 10px 30px rgba(0,0,0,0.2)}
</style></head><body>
<div class="card">
  <div class="lbl">Shadow system</div>
  <div class="row">
    <div class="b">no shadow</div>
    <div class="b shadow-card">card</div>
    <div class="b shadow-chart">chart</div>
    <div class="b shadow-pop" style="background:#1C1917;color:#F5F1EA">pop · toast</div>
  </div>
</div></body></html>
