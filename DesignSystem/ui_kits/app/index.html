<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>OpenPlotAgent — UI Kit</title>
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Workspace.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [view, setView] = useState('workspace');
    const [activeProject, setActiveProject] = useState('Nature Submission 2026');
    return (
      <div className="opa-app" data-screen-label="OpenPlotAgent app">
        <Header view={view} setView={setView} crumb={activeProject} />
        {view === 'dashboard'
          ? <Dashboard onOpen={(id) => { setActiveProject(id); setView('workspace'); }} onNew={() => {}} />
          : <Workspace projectName={activeProject} onBack={() => setView('dashboard')} />
        }
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
